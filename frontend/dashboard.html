<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    .story {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>
<div><button id="verifyButton">verify</button></div>


<div class="container">

  <h2>My Dashboard</h2>

  <!-- Publish box -->
  <h3>Publish a Story</h3>
  <textarea id="storyText" placeholder="Write something..."></textarea>
  <br />
  <button onclick="publishStory()">Publish</button>

  <hr />

  <!-- Stories -->
  <h3>Your Stories</h3>
  <div id="stories"></div>
</div>

<script src="../dashboard.js">
</script>

</body>
</html>
